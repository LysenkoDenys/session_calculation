<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="description" content="tracker" />
    <title>tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="src/script.js" type="module" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div id="chart-modal" class="modal hidden">
      <div class="modal-content chart-modal-content">
        <canvas id="chart"></canvas>
      </div>
    </div>
    <!-- DELETE ONE SESSION with undo toast -->
    <div id="undo-toast" class="undo-toast hidden">
      <span class="undo-message">Deleted</span>
      <button id="undo-btn">
        <span>Undo</span>
        <div class="undo-progress"></div>
      </button>
    </div>
    <!-- DELETE ALL SESSIONS -->
    <div id="modal-delete-all" class="modal hidden">
      <div class="modal-content">
        <p>Delete all data?</p>
        <button id="confirm-delete-all">Yes</button>
        <button id="cancel-delete-all">No</button>
      </div>
    </div>
    <div class="container">
      <button
        id="toggle-button"
        class="btn start"
        aria-label="start-button"
        title="start/stop"
      >
        <i id="toggle-icon" class="fa-solid fa-play"></i>
      </button>

      <div class="header">
        <div class="session-form">
          <div class="timer" id="timer">
            <h1 id="time-display">00:00:00</h1>
          </div>
          <div class="input-wrapper">
            <select id="category-select"></select>

            <button
              id="chart-button"
              class="btn chart"
              aria-label="chart-button"
              title="chart"
            >
              <i class="fa-solid fa-chart-column"></i>
            </button>
            <div class="settings-wrapper">
              <button
                id="settings-button"
                class="btn settings"
                aria-label="settings-button"
                title="settings"
              >
                <i class="fa-solid fa-gear"></i>
              </button>
              <div id="settings-menu" class="settings-menu hidden">
                <button id="export-button">Export</button>
                <input
                  type="file"
                  id="import-input"
                  accept="application/json"
                  hidden
                />
                <button id="import-button">Import</button>
                <button id="delete-button">Delete all</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="sessions">
        <div id="empty-state" class="empty-state">
          <p>No sessions yet.</p>
          <p>Start tracking... 🚀</p>
        </div>
        <div id="session-container"></div>
      </div>
      <button id="load-more">
        <i class="fa-solid fa-chevron-down"></i>
        <span class="label">Load more</span>
      </button>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").then(
            function (registration) {
              // Registration was successful
              console.log(
                "ServiceWorker registration successful with scope: ",
                registration.scope,
              );
            },
            function (err) {
              // Registration failed
              console.log("ServiceWorker registration failed: ", err);
            },
          );
        });
      }
    </script>
  </body>
</html>
